<form [formGroup]="userForm" (ngSubmit)="onSubmit()">

  <div class="form-group">
  <label>First Name</label>
  <input type="text" formControlName="firstName" />
  <div *ngIf="submitted && userForm.controls.firstName.errors">
    First name is required
  </div>
  </div>

  <div class="form-group">
  <label>Middle Name</label>
  <input type="text" formControlName="middleName" />
  </div>

  <div class="form-group">
  <label>Last Name</label>
  <input type="text" formControlName="lastName" />
  <div *ngIf="submitted && userForm.controls.lastName.errors">
    Last name is required
  </div>
  </div>

  <div class="form-group">
  <label>Gender</label>
  <select formControlName="gender">
    <option value="">Select</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
  </select>
  </div>

  <div class="form-group">
  <label>Email</label>
  <input type="email" formControlName="email" />
  <div *ngIf="submitted && userForm.controls.email.errors">
    Valid email is required
  </div>
  </div>

  <div class="form-group">
  <label>Mobile Number</label>
  <input type="text" formControlName="mobileNumber" />
  <div *ngIf="submitted && userForm.controls.mobileNumber.errors">
    Valid 10-digit mobile number required
  </div>
  </div>

  <button type="submit">Submit</button>
</form>
