<div class="signin-container">
  <div class="signin-card">
    <h2>Alumni Portal <span *ngIf="isRegisterMode">(Register)</span></h2>

    <div *ngIf="!isRegisterMode">
     
          <p class="subtitle">Sign in to continue</p>

    <form [formGroup]="signinForm" (ngSubmit)="onSubmit()">

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="Enter your email"
        />
        <small *ngIf="submitted && f['email'].errors">
          Valid email is required
        </small>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="Enter your password"
        />
        <small *ngIf="submitted && f['password'].errors">
          Minimum 6 characters required
        </small>
      </div>

      <!-- Remember Me -->
      <!-- <div class="options">
        <label>
          <input type="checkbox" formControlName="rememberMe" />
          Remember me
        </label>
        <a href="#">Forgot Password?</a>
      -->
      <!-- </div> -->


      <button type="submit" [disabled]="loading">
       {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>

<p class="error" *ngIf="errorMsg">
  {{ errorMsg }}
</p>

      <!-- Footer -->
      <p class="footer">
        Don't have an account? <a (click)="toggleMode()">Register</a>
      </p>
      </form>
    </div>


      <div *ngIf="isRegisterMode">
  <app-add-user></app-add-user>

  <p>
    Already have an account?
    <a (click)="toggleMode()">Login</a>
  </p>
</div>

</div>
</div>
